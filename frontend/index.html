<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>SonicUV</title>
</head>
<body>
    <div id="blurBg"></div>
    
    <div class="search-container">
        <select id="searchFilter">
            <option value="all">All</option>
            <option value="artist">Artist</option>
            <option value="title">Title</option>
            <option value="tags">Tags</option>
        </select>
        <input type="text" id="searchInput" placeholder="Search your library...">
    </div>
    
    <ul id="songList"></ul>

    <div id="stickyPlayer">
        <button id="closeBtn" class="max-only"><i class="fa-solid fa-xmark"></i></button>

        <div id="playerInfo">
            <img id="playerImg">
            <div class="player-text">
                <h4 id="playerTitle">Select a song</h4>
                <p id="playerArtist">-</p>
            </div>
        </div>
        
        <div id="controlCenter">
            <div id="progressWrapper">
                <span id="currentTime">0:00</span>
                <input type="range" id="progressBar" value="0" step="1">
                <span id="totalTime">0:00</span>
            </div>

            <div id="mediaControls">
                <button id="randomBtn"><i class="fa-solid fa-shuffle"></i></button>
                <button id="prevBtn"><i class="fa-solid fa-backward-step"></i></button>
                <button id="playPauseBtn"><i class="fa-solid fa-play"></i></button>
                <button id="nextBtn"><i class="fa-solid fa-forward-step"></i></button>
                <button id="loopBtn"><i class="fa-solid fa-repeat"></i></button>
            </div>

            <div id="volumeWrapper">
                <i class="fa-solid fa-volume-low"></i>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
                <i class="fa-solid fa-volume-high"></i>
            </div>
        </div>

        <button id="maximizeBtn" class="min-only"><i class="fa-solid fa-expand"></i></button>
    </div>

<script>
    let allSongsData = [];
    let filteredSongsData = [];
    let renderIndex = 0;
    const chunkSize = 50;

    // --- 1. THE BRIDGE TRANSMITTER ---
    function sendToExtension(actionName, extraData = {}) {
        window.postMessage({
            direction: "from-page-to-extension",
            message: { target: 'offscreen', action: actionName, ...extraData }
        }, window.origin);
    }

    // --- 2. THE VIRTUAL SCROLL & SEARCH ENGINE ---
    async function fetchSongs() {
        const response = await fetch('/api/songs');
        const data = await response.json();
        allSongsData = data.songs;
        filteredSongsData = allSongsData; // Start by showing all songs

        renderNextBatch();
        setupObserver();

        // Wire up the new Dropdown and Search Bar
        document.getElementById('searchInput').addEventListener('input', performSearch);
        document.getElementById('searchFilter').addEventListener('change', performSearch);
    }

    function createSongElement(song) {
        const li = document.createElement("li");
        li.className = "song-card";
        li.innerHTML = `
            <img src="/api/image/${song.id}" class="song-img" loading="lazy" onerror="this.src=''">
            <div class="song-info">
                <h3>${song.title}</h3>
                <p>${song.artist}</p>
            </div>
        `;
        li.onclick = () => sendToExtension('playSpecific', { id: song.id });
        return li;
    }

    function renderNextBatch() {
        const list = document.getElementById('songList');
        const end = Math.min(renderIndex + chunkSize, filteredSongsData.length);

        for (let i = renderIndex; i < end; i++) {
            list.appendChild(createSongElement(filteredSongsData[i]));
        }
        renderIndex = end;
    }

    function setupObserver() {
        const trigger = document.createElement('div');
        trigger.id = "scrollTrigger";
        trigger.style.height = "20px"; // Invisible trigger box
        document.getElementById('songList').after(trigger);

        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && renderIndex < filteredSongsData.length) {
                renderNextBatch();
            }
        });
        observer.observe(trigger);
    }

    function performSearch() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const currentFilter = document.getElementById('searchFilter').value;

        // Filter the raw data, NOT the HTML elements
        filteredSongsData = allSongsData.filter(song => {
            const t = song.title.toLowerCase();
            const a = song.artist.toLowerCase();
            const tags = song.tags.toLowerCase();

            if (currentFilter === 'all') return a.includes(searchTerm) || t.includes(searchTerm) || tags.includes(searchTerm);
            if (currentFilter === 'artist') return a.includes(searchTerm);
            if (currentFilter === 'title') return t.includes(searchTerm);
            if (currentFilter === 'tags') return tags.includes(searchTerm);
            return true;
        });

        // Nuke the list and render the first 50 results
        document.getElementById('songList').innerHTML = '';
        renderIndex = 0;
        renderNextBatch();
    }

    // --- 3. WIRING UP BUTTONS ---
    document.getElementById('playPauseBtn').addEventListener('click', () => sendToExtension('playPause'));
    document.getElementById('nextBtn').addEventListener('click', () => sendToExtension('next'));
    document.getElementById('prevBtn').addEventListener('click', () => sendToExtension('previous'));
    document.getElementById('randomBtn').addEventListener('click', () => sendToExtension('toggleRandom'));
    document.getElementById('loopBtn').addEventListener('click', () => sendToExtension('toggleLoop'));

    const progressBar = document.getElementById('progressBar');
    progressBar.addEventListener('input', () => sendToExtension('seek', { time: progressBar.value }));

    const volumeSlider = document.getElementById('volumeSlider');
    volumeSlider.addEventListener('input', (e) => sendToExtension('setVolume', { volume: e.target.value }));

    // --- 4. THE BRIDGE RECEIVER ---
    const currentTimeText = document.getElementById('currentTime');
    const totalTimeText = document.getElementById('totalTime');

    function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60).toString().padStart(2, '0');
        return `${mins}:${secs}`;
    }

    window.addEventListener("message", (event) => {
        if (event.source !== window || event.origin !== window.origin) return;

        if (event.data.direction === "bridge-ready") sendToExtension('requestState');

        if (event.data.direction === "from-extension-to-page") {
            const message = event.data.message;

            if (message.action === 'updateUI') {
                document.getElementById('playerTitle').innerText = message.title;
                document.getElementById('playerArtist').innerText = message.artist;
                document.getElementById('playerImg').src = `/api/image/${message.imageId}`;
                document.getElementById('blurBg').style.backgroundImage = `url('/api/image/${message.imageId}')`;
                
                document.getElementById('playPauseBtn').innerHTML = message.isPlaying 
                    ? '<i class="fa-solid fa-pause"></i>' 
                    : '<i class="fa-solid fa-play"></i>';

                document.getElementById('randomBtn').classList.toggle('active-btn', message.isRandom);
                document.getElementById('loopBtn').classList.toggle('active-btn', message.isLooping);
            }

            if (message.action === 'timeUpdate') {
                progressBar.max = message.duration;
                progressBar.value = message.currentTime;
                currentTimeText.innerText = formatTime(message.currentTime);
                totalTimeText.innerText = formatTime(message.duration);
            }
        }
    });

    // --- 5. MAXIMIZE LOGIC ---
    const maximizeBtn = document.getElementById('maximizeBtn');
    const closeBtn = document.getElementById('closeBtn');
    const stickyPlayer = document.getElementById('stickyPlayer');

    function toggleMaximize() {
        stickyPlayer.classList.toggle('maximized');
        document.body.classList.toggle('is-maximized');
        document.body.style.overflow = stickyPlayer.classList.contains('maximized') ? "hidden" : "auto";
    }

    maximizeBtn.addEventListener('click', toggleMaximize);
    closeBtn.addEventListener('click', toggleMaximize);

    fetchSongs();
</script>
</body>
</html>
